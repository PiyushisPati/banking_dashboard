<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Banking Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.container{
    display:grid;
    grid-template-columns:250px 1fr;
    min-height:100vh;
}

.sidebar{
    background:#111827;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#38bdf8;
    margin-bottom:40px;
}

.menu{
    list-style:none;
}

.menu li{
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.menu li:hover{
    background:#1e293b;
}

.main{
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile{
    background:#1e293b;
    padding:10px 20px;
    border-radius:30px;
}

.cards{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

.card h3{
    color:#94a3b8;
}

.balance{
    font-size:35px;
    margin-top:10px;
    color:#38bdf8;
}

.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.action-card{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.transactions{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

.transaction-item{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-bottom:1px solid #334155;
}

canvas{
    margin-top:20px;
    width:100%;
    background:#111827;
    border-radius:15px;
}

@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">
    <div class="logo">🏦 NeoBank</div>

    <ul class="menu">
        <li>Dashboard</li>
        <li>Accounts</li>
        <li>Transfers</li>
        <li>Payments</li>
        <li>Cards</li>
        <li>Settings</li>
    </ul>
</div>

<div class="main">

<div class="header">
    <h1>Banking Dashboard</h1>
    <div class="profile">John Doe</div>
</div>

<div class="cards">

<div class="card">
    <h3>Total Balance</h3>
    <div class="balance" id="balance">$10,000</div>
</div>

<div class="card">
    <h3>Total Deposits</h3>
    <div class="balance" id="deposits">$0</div>
</div>

<div class="card">
    <h3>Total Withdrawals</h3>
    <div class="balance" id="withdrawals">$0</div>
</div>

</div>

<div class="actions">

<div class="action-card">
    <h2>Deposit</h2>
    <input type="number" id="depositAmount" placeholder="Amount">
    <button onclick="deposit()">Deposit</button>
</div>

<div class="action-card">
    <h2>Withdraw</h2>
    <input type="number" id="withdrawAmount" placeholder="Amount">
    <button onclick="withdrawMoney()">Withdraw</button>
</div>

<div class="action-card">
    <h2>Transfer</h2>
    <input type="text" id="receiver" placeholder="Receiver Name">
    <input type="number" id="transferAmount" placeholder="Amount">
    <button onclick="transfer()">Transfer</button>
</div>

</div>

<div class="transactions">
    <h2>Recent Transactions</h2>
    <div id="transactionList"></div>

    <canvas id="chart" width="800" height="250"></canvas>
</div>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("bankData")) || {
    balance:10000,
    deposits:0,
    withdrawals:0,
    transactions:[]
};

function saveData(){
    localStorage.setItem("bankData", JSON.stringify(data));
}

function updateUI(){

    document.getElementById("balance").innerText =
        "$" + data.balance.toLocaleString();

    document.getElementById("deposits").innerText =
        "$" + data.deposits.toLocaleString();

    document.getElementById("withdrawals").innerText =
        "$" + data.withdrawals.toLocaleString();

    const list = document.getElementById("transactionList");

    list.innerHTML = "";

    data.transactions.slice().reverse().forEach(tx => {

        list.innerHTML += `
        <div class="transaction-item">
            <span>${tx.type}</span>
            <span>${tx.amount}</span>
        </div>
        `;
    });

    drawChart();
}

function addTransaction(type, amount){

    data.transactions.push({
        type:type,
        amount:"$"+amount,
        date:new Date()
    });

    saveData();
    updateUI();
}

function deposit(){

    let amount =
        Number(document.getElementById("depositAmount").value);

    if(amount <= 0) return;

    data.balance += amount;
    data.deposits += amount;

    addTransaction("Deposit", amount);

    document.getElementById("depositAmount").value="";
}

function withdrawMoney(){

    let amount =
        Number(document.getElementById("withdrawAmount").value);

    if(amount <= 0) return;

    if(amount > data.balance){
        alert("Insufficient funds");
        return;
    }

    data.balance -= amount;
    data.withdrawals += amount;

    addTransaction("Withdrawal", amount);

    document.getElementById("withdrawAmount").value="";
}

function transfer(){

    let receiver =
        document.getElementById("receiver").value;

    let amount =
        Number(document.getElementById("transferAmount").value);

    if(receiver === "" || amount <= 0) return;

    if(amount > data.balance){
        alert("Insufficient funds");
        return;
    }

    data.balance -= amount;

    addTransaction(
        "Transfer to " + receiver,
        amount
    );

    document.getElementById("receiver").value="";
    document.getElementById("transferAmount").value="";
}

function drawChart(){

    const canvas =
        document.getElementById("chart");

    const ctx =
        canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let values = [
        data.balance/100,
        data.deposits/100,
        data.withdrawals/100
    ];

    const colors = [
        "#38bdf8",
        "#22c55e",
        "#ef4444"
    ];

    values.forEach((value,index)=>{

        ctx.fillStyle = colors[index];

        ctx.fillRect(
            120 + index*180,
            canvas.height - value,
            100,
            value
        );
    });

    ctx.fillStyle="white";
    ctx.font="16px Arial";

    ctx.fillText("Balance",125,240);
    ctx.fillText("Deposits",295,240);
    ctx.fillText("Withdrawals",455,240);
}

updateUI();
</script>

</body>
</html>
